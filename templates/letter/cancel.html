{% extends "letter/_base.html" %}
{% block title %}{{ title or "Cancelled" }}{% endblock %}

{% block content %}
<div class="wrap" style="max-width:520px;padding-top:120px;text-align:center">
  <div style="font-size:44px" class="fade-up">✦</div>
  <h1 class="fade-up d1" style="font-size:30px;margin:18px 0 10px">{{ title or "Cancelled" }}</h1>
  <p class="fade-up d2" style="color:var(--ink-dim);margin-bottom:30px">{{ message or "" }}</p>
  <a class="fade-up d3 btn btn-gold" href="/letter/" style="font-size:16px">Back to Home</a>
</div>
{% endblock %}
