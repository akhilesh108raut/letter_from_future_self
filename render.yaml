services:
  - type: web
    name: letter-from-future-self
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 500
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
